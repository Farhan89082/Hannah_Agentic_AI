<line x1="530" y1="330" x2="578" y2="330" stroke="#c0aed8" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>

<!-- Legend -->
<text x="40" y="480" font-family="'Helvetica Neue',sans-serif" font-size="9" fill="#9a8f8a">Voice pipeline</text>
<line x1="100" y1="476" x2="130" y2="476" stroke="#a8c4ae" stroke-width="1.2"/>
<text x="140" y="480" font-family="'Helvetica Neue',sans-serif" font-size="9" fill="#9a8f8a">Tool calls</text>
