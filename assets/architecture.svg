<line x1="220" y1="250" x2="288" y2="250" stroke="#a8c4ae" stroke-width="1.2" marker-end="url(#arr2)"/>
<!-- LLM → TTS -->
<line x1="530" y1="250" x2="598" y2="250" stroke="#a8c4ae" stroke-width="1.2" marker-end="url(#arr2)"/>
<!-- TTS back to LiveKit (curved) -->
<path d="M 680 224 Q 740 180 640 170 Q 560 162 530 170" fill="none" stroke="#a8c4ae" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr2)"/>

<!-- Arrow: LLM → Tools -->
<line x1="410" y1="276" x2="410" y2="304" stroke="#e0bc98" stroke-width="1.2" marker-end="url(#arr3)"/>
<text x="424" y="294" font-family="'Helvetica Neue',sans-serif" font-size="9" fill="#e0bc98">tool call</text>

<!-- ══ ROW 4: FastMCP ══ -->
<rect x="290" y="304" width="240" height="52" rx="12" fill="rgba(240,212,184,0.22)" stroke="#e0bc98" stroke-width="1.2"/>
