<svg width="100%" viewBox="0 0 820 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Hannah Architecture Diagram</title>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#c0aed8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#a8c4ae" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#e8a8a8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect width="820" height="520" fill="#faf7f2" rx="0"/>

<!-- ── Title ── -->
<text x="410" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="400" letter-spacing="3" fill="#3d3530">HANNAH  —  ARCHITECTURE</text>
<line x1="200" y1="46" x2="620" y2="46" stroke="#e8a8a8" stroke-width="0.8"/>

<!-- ══ ROW 1: User ══ -->
<!-- User card -->
<rect x="330" y="64" width="160" height="52" rx="12" fill="rgba(255,255,255,0.75)" stroke="#f2c4c4" stroke-width="1.2"/>
<text x="410" y="85" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="400" fill="#3d3530">You</text>
<text x="410" y="103" text-anchor="middle" font-family="'Helvetica Neue',sans-serif" font-size="10" fill="#9a8f8a">Voice via microphone</text>

<!-- Arrow down to LiveKit -->
<line x1="410" y1="116" x2="410" y2="144" stroke="#c0aed8" stroke-width="1.2" marker-end="url(#arr)"/>
<text x="422" y="134" font-family="'Helvetica Neue',sans-serif" font-size="9" fill="#c0aed8">WebRTC</text>

<!-- ══ ROW 2: LiveKit ══ -->
<rect x="290" y="144" width="240" height="52" rx="12" fill="rgba(212,196,232,0.18)" stroke="#c0aed8" stroke-width="1.2"/>
<text x="410" y="165" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#3d3530">LiveKit Room</text>
<text x="410" y="183" text-anchor="middle" font-family="'Helvetica Neue',sans-serif" font-size="10" fill="#9a8f8a">Voice agent infrastructure</text>

