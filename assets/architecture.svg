<line x1="410" y1="196" x2="410" y2="224" stroke="#c0aed8" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- ══ ROW 3: AI Pipeline ══ -->
<!-- STT -->
<rect x="60" y="224" width="160" height="52" rx="12" fill="rgba(196,216,200,0.2)" stroke="#a8c4ae" stroke-width="1.2"/>
