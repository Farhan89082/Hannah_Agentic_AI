<text x="410" y="245" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#3d3530">Google Gemini Flash-Lite</text>
<text x="410" y="263" text-anchor="middle" font-family="'Helvetica Neue',sans-serif" font-size="10" fill="#9a8f8a">Language model  ·  tool orchestration</text>

<!-- TTS -->
<rect x="600" y="224" width="160" height="52" rx="12" fill="rgba(196,216,200,0.2)" stroke="#a8c4ae" stroke-width="1.2"/>
<text x="680" y="245" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#3d3530">Deepgram Aura</text>
<text x="680" y="263" text-anchor="middle" font-family="'Helvetica Neue',sans-serif" font-size="10" fill="#9a8f8a">Text-to-speech</text>

