<path d="M 530 304 Q 560 270 530 250" fill="none" stroke="#e0bc98" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr3)"/>
<text x="556" y="280" font-family="'Helvetica Neue',sans-serif" font-size="9" fill="#e0bc98" text-anchor="middle">result</text>

