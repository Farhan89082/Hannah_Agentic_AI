<text x="230" y="430" text-anchor="middle" font-family="'Helvetica Neue',sans-serif" font-size="9" fill="#9a8f8a">Preprints</text>

<!-- arXiv -->
<line x1="410" y1="380" x2="410" y2="396" stroke="#e0bc98" stroke-width="0.8"/>
<rect x="334" y="396" width="152" height="44" rx="10" fill="rgba(188,212,232,0.22)" stroke="#bcd4e8" stroke-width="1"/>
<text x="410" y="414" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#3d3530">arXiv</text>
<text x="410" y="430" text-anchor="middle" font-family="'Helvetica Neue',sans-serif" font-size="9" fill="#9a8f8a">AI/ML papers</text>

<!-- FDA -->
<line x1="410" y1="380" x2="590" y2="396" stroke="#e0bc98" stroke-width="0.8"/>
<rect x="514" y="396" width="152" height="44" rx="10" fill="rgba(242,196,196,0.2)" stroke="#f2c4c4" stroke-width="1"/>
<text x="590" y="414" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#3d3530">FDA / EMA</text>
<text x="590" y="430" text-anchor="middle" font-family="'Helvetica Neue',sans-serif" font-size="9" fill="#9a8f8a">Regulatory updates</text>

<!-- News -->
<line x1="410" y1="380" x2="726" y2="396" stroke="#e0bc98" stroke-width="0.8"/>
<rect x="648" y="396" width="152" height="44" rx="10" fill="rgba(242,196,196,0.2)" stroke="#f2c4c4" stroke-width="1"/>
<text x="724" y="414" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#3d3530">Biotech News RSS</text>
<text x="724" y="430" text-anchor="middle" font-family="'Helvetica Neue',sans-serif" font-size="9" fill="#9a8f8a">Fierce, BioPharma, Nature</text>

